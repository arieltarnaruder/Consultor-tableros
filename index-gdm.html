// ════════════════════════════════════════════════════════════
//  VISTA EQUIPOS — desempeño por responsable
//  Combina vista de RZN por zona + otros responsables por rol
// ════════════════════════════════════════════════════════════
function VistaEquipos({ tareas, onEditar, usuarios }) {
  const [subvista, setSubvista] = useState("rzn");     // "rzn" | "otros"
  const [zonaActiva, setZonaActiva]     = useState(null);
  const [rolActivo, setRolActivo]       = useState(null);
  const [progActivo, setProgActivo]     = useState(null);
  const [planActivo, setPlanActivo]     = useState(null);

  // ── SUB-VISTA RZN ─────────────────────────────────────────
  // (lógica idéntica a la VistaZonas anterior)
  const dataZonas = useMemo(() => {
    return ZONAS.map(zona => {
      const tareasRZN = tareas.filter(t => esRZNColectivo(t));
      const avances = tareasRZN.map(t => t.zonas?.[zona]?.avance ?? t.avance);
      const avProm = avances.length ? avances.reduce((a,b)=>a+b,0)/avances.length : 0;
      const porProg = {};
      tareas.forEach(t => {
        if (!esRZNColectivo(t)) return;
        if (!porProg[t.programa]) porProg[t.programa] = {};
        if (!porProg[t.programa][t.plan]) porProg[t.programa][t.plan] = [];
        porProg[t.programa][t.plan].push({
          ...t,
          avanceZona: t.zonas?.[zona]?.avance ?? t.avance,
          estadoZona: t.zonas?.[zona]?.estado ?? t.estado,
          comentarioZona: t.zonas?.[zona]?.comentario ?? "",
        });
      });
      return { zona, avProm, porProg };
    });
  }, [tareas]);

  // ── SUB-VISTA OTROS RESPONSABLES ──────────────────────────
  // Agrupa tareas por rol (excluye RZN x 9 y SR)
  const dataRoles = useMemo(() => {
    const roles = {};
    tareas.forEach(t => {
      if (!t.responsable) return;
      const resp = t.responsable;
      // Separar responsables compuestos: "SR PM DC" → ["SR","PM","DC"]
      const partes = resp.split(/\s+/);
      partes.forEach(p => {
        const r = p.toLowerCase();
        if (r === "sr" || r === "x" || r === "9" || r === "rzn") return;
        if (!roles[p]) roles[p] = [];
        roles[p].push(t);
      });
    });
    // Calcular avance promedio por rol
    return Object.entries(roles).map(([rol, ts]) => ({
      rol,
      tareas: ts,
      avProm: avg(ts.map(t => t.avance)),
    })).sort((a,b) => b.tareas.length - a.tareas.length);
  }, [tareas]);

  // ── NAVEGACIÓN DRILL-DOWN RZN ─────────────────────────────
  const resetZona = () => { setZonaActiva(null); setProgActivo(null); setPlanActivo(null); };
  const resetProg = () => { setProgActivo(null); setPlanActivo(null); };

  const zdData = zonaActiva ? dataZonas.find(z => z.zona === zonaActiva) : null;

  // ── RENDER ────────────────────────────────────────────────
  return (
    <div>
      <LeyendaSemaforo/>

      {/* Selector de subvista */}
      <div style={{ display:"flex", gap:8, marginBottom:18 }}>
        <button onClick={()=>{setSubvista("rzn");resetZona();setRolActivo(null);}}
          style={{ padding:"8px 18px", borderRadius:99, border:`1.5px solid ${subvista==="rzn"?CLIENTE.colorA:"#E2E8F0"}`, background:subvista==="rzn"?CLIENTE.colorA:"#F8FAFC", color:subvista==="rzn"?"#fff":"#64748B", fontSize:13, fontWeight:700, cursor:"pointer" }}>
          Zonas RZN
        </button>
        <button onClick={()=>{setSubvista("otros");resetZona();setRolActivo(null);}}
          style={{ padding:"8px 18px", borderRadius:99, border:`1.5px solid ${subvista==="otros"?CLIENTE.colorB:"#E2E8F0"}`, background:subvista==="otros"?CLIENTE.colorB:"#F8FAFC", color:subvista==="otros"?"#fff":"#64748B", fontSize:13, fontWeight:700, cursor:"pointer" }}>
          Otros responsables
        </button>
      </div>

      {/* ── SUBVISTA RZN ── */}
      {subvista === "rzn" && !zonaActiva && (
        <div>
          <div style={{ fontSize:11, color:"#64748B", fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", marginBottom:12 }}>Avance por zona</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:10, marginBottom:20 }}>
            {dataZonas.map(({ zona, avProm }) => {
              const { bar, bg, text, label } = colorAvance(avProm);
              return (
                <div key={zona} onClick={() => { setZonaActiva(zona); resetProg(); }}
                  style={{ background:"#fff", border:"1px solid #E2E8F0", borderTop:`4px solid ${bar}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", transition:"box-shadow .15s" }}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.08)"}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  <div style={{ fontSize:11, color:"#94A3B8", fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", marginBottom:6 }}>{zona}</div>
                  <div style={{ fontSize:26, fontWeight:800, color:bar, lineHeight:1 }}>{pct(avProm)}%</div>
                  <span style={{ fontSize:10, background:bg, color:text, borderRadius:99, padding:"1px 8px", fontWeight:700, marginTop:6, display:"inline-block" }}>{label}</span>
                </div>
              );
            })}
          </div>
          {/* Tabla comparativa */}
          <div style={{ background:"#fff", border:"1px solid #E2E8F0", borderRadius:12, overflow:"hidden" }}>
            <div style={{ padding:"14px 18px", borderBottom:"1px solid #E2E8F0", fontWeight:700, color:"#0F172A", fontSize:14 }}>Ranking de zonas</div>
            <div style={{ padding:"12px 18px", display:"flex", flexDirection:"column", gap:8 }}>
              {[...dataZonas].sort((a,b)=>b.avProm-a.avProm).map(({ zona, avProm }, i) => {
                const { bar } = colorAvance(avProm);
                return (
                  <div key={zona} style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}
                    onClick={() => { setZonaActiva(zona); resetProg(); }}>
                    <span style={{ fontSize:11, fontWeight:700, color:"#94A3B8", minWidth:18 }}>#{i+1}</span>
                    <span style={{ fontSize:12, fontWeight:700, color:"#475569", minWidth:58 }}>{zona}</span>
                    <div style={{ flex:1 }}><BarraAvance valor={avProm} height={8}/></div>
                    <span style={{ fontSize:13, fontWeight:800, color:bar, minWidth:38, textAlign:"right" }}>{pct(avProm)}%</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Drill-down zona → programa → plan → tareas */}
      {subvista === "rzn" && zonaActiva && !progActivo && zdData && (
        <div>
          <button onClick={resetZona} style={{ background:"none", border:"none", color:CLIENTE.colorA, cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:18, padding:0 }}>
            ← Todas las zonas
          </button>
          <div style={{ borderLeft:`4px solid ${colorAvance(zdData.avProm).bar}`, paddingLeft:14, marginBottom:18 }}>
            <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>ZONA</div>
            <h2 style={{ margin:0, fontSize:20, fontWeight:800, color:"#0F172A" }}>{zonaActiva}</h2>
            <div style={{ fontSize:13, color:"#64748B", marginTop:4 }}>Avance promedio: <strong style={{ color:colorAvance(zdData.avProm).bar }}>{pct(zdData.avProm)}%</strong></div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {Object.keys(zdData.porProg).map((prog, i) => {
              const planes = zdData.porProg[prog];
              const allTs = Object.values(planes).flat();
              const av = avg(allTs.map(t => t.avanceZona));
              const { bar: b } = colorAvance(av);
              return (
                <Card key={prog} onClick={() => setProgActivo(prog)} accent={b}>
                  <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:3 }}>PROGRAMA</div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, gap:10 }}>
                    <span style={{ fontWeight:700, color:"#0F172A", fontSize:14 }}>{prog}</span>
                    <span style={{ fontWeight:800, color:b, fontSize:18 }}>{pct(av)}%</span>
                  </div>
                  <BarraAvance valor={av} height={6}/>
                  <div style={{ fontSize:11, color:"#94A3B8", marginTop:6 }}>{Object.keys(planes).length} planes · {allTs.length} tareas</div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {subvista === "rzn" && zonaActiva && progActivo && !planActivo && zdData && (
        <div>

              ← {progActivo}

            <div style={{ borderLeft:`4px solid ${colorAvance(avg(ts.map(t=>t.avanceZona))).bar}`, paddingLeft:14, marginBottom:18 }}>
              <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>PLAN · {zonaActiva}</div>
              <h2 style={{ margin:0, fontSize:18, fontWeight:800, color:"#0F172A" }}>{planActivo}</h2>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
              {ts.map(t => {
                const { bar: b } = colorAvance(t.avanceZona);
                const eCfg = ESTADO_CFG[t.estadoZona];
                return (
                  <Card key={t.id} onClick={() => onEditar(t)} accent={b}>
                    <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:3 }}>TAREA</div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, marginBottom:8, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, color:"#0F172A", fontSize:13, flex:1, lineHeight:1.35 }}>{t.tarea||"(Sin nombre)"}</span>
                      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                        <span style={{ fontSize:11, background:eCfg?.bg, color:eCfg?.text, borderRadius:99, padding:"2px 9px", fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>
                          <span style={{ width:6, height:6, borderRadius:"50%", background:eCfg?.dot }}/>
                          {t.estadoZona}
                        </span>
                        <span style={{ fontWeight:800, color:b, fontSize:15 }}>{pct(t.avanceZona)}%</span>
                      </div>
                    </div>
                    <BarraAvance valor={t.avanceZona} height={6}/>
                    {t.comentarioZona && <div style={{ fontSize:11, color:"#94A3B8", marginTop:7, fontStyle:"italic" }}> {t.comentarioZona}</div>}
                    <div style={{ display:"flex", gap:10, marginTop:6, flexWrap:"wrap" }}>

      })()}

      {/* ── SUBVISTA OTROS RESPONSABLES ── */}
      {subvista === "otros" && !rolActivo && (
        <div>
          <div style={{ fontSize:11, color:"#64748B", fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", marginBottom:12 }}>
            Avance por responsable

          {dataRoles.length === 0 && (
            <div style={{ textAlign:"center", padding:40, color:"#94A3B8", fontSize:14 }}>

          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {dataRoles.map(({ rol, tareas: ts, avProm }) => {
              const { bar, bg, text, label } = colorAvance(avProm);
              const byEst = {};
              ts.forEach(t => { byEst[t.estado] = (byEst[t.estado]||0)+1; });
              // Encontrar nombre real del usuario si existe
              const usuarioReal = usuarios?.find(u => u.rol.toLowerCase() === rol.toLowerCase());
              return (
                <Card key={rol} onClick={() => setRolActivo(rol)} accent={bar}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, marginBottom:10, flexWrap:"wrap" }}>
                    <div>
                      <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>RESPONSABLE</div>
                      <div style={{ fontWeight:700, color:"#0F172A", fontSize:15 }}>{usuarioReal?.nombre || rol}</div>
                      {usuarioReal && <div style={{ fontSize:11, color:"#64748B", marginTop:2 }}>Rol: {rol}</div>}
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:24, fontWeight:800, color:bar, lineHeight:1 }}>{pct(avProm)}%</div>
                      <span style={{ fontSize:10, background:bg, color:text, borderRadius:99, padding:"1px 8px", fontWeight:700 }}>{label}</span>
                    </div>
                  </div>
                  <BarraAvance valor={avProm} height={6}/>
                  <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
                    <span style={{ fontSize:11, color:"#94A3B8" }}>{ts.length} tareas</span>

                        {e} {n}
                      </span>
                    ))}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* Detalle de tareas de un rol */}
      {subvista === "otros" && rolActivo && (() => {
        const rolData = dataRoles.find(r => r.rol === rolActivo);
        if (!rolData) return null;
        const usuarioReal = usuarios?.find(u => u.rol.toLowerCase() === rolActivo.toLowerCase());
        return (
          <div>
            <button onClick={() => setRolActivo(null)} style={{ background:"none", border:"none", color:CLIENTE.colorA, cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:18, padding:0 }}>

            </button>
            <div style={{ borderLeft:`4px solid ${colorAvance(rolData.avProm).bar}`, paddingLeft:14, marginBottom:18 }}>

              <h2 style={{ margin:0, fontSize:20, fontWeight:800, color:"#0F172A" }}>{usuarioReal?.nombre || rolActivo}</h2>
              <div style={{ fontSize:13, color:"#64748B", marginTop:4 }}>
                {rolData.tareas.length} tareas · Avance promedio: <strong style={{ color:colorAvance(rolData.avProm).bar }}>{pct(rolData.avProm)}%</strong>
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
              {rolData.tareas.map(t => {

                return (
                  <Card key={t.id} onClick={() => onEditar(t)} accent={b}>

      })()}
    </div>

}

//  VISTA ZONAS
// ════════════════════════════════════════════════════════════
function VistaZonas({ tareas, onEditar }) {
  const [zonaActiva, setZonaActiva] = useState(null);
  const [progActivo, setProgActivo] = useState(null);
  const [planActivo, setPlanActivo] = useState(null);

  // Calcular avance por zona para todas las tareas RZN
  const dataZonas = useMemo(() => {
    return ZONAS.map(zona => {
      // Para tareas RZN con zonas cargadas
      const tareasRZN = tareas.filter(t => esRZNColectivo(t));
      const avances = tareasRZN.map(t => {
        const zdata = t.zonas?.[zona];
        return zdata ? zdata.avance : t.avance; // fallback al avance general
      });
      const avProm = avances.length ? avances.reduce((a,b)=>a+b,0)/avances.length : 0;

      // Por programa
      const porProg = {};
      tareas.forEach(t => {
        if (!esRZNColectivo(t)) return;
        if (!porProg[t.programa]) porProg[t.programa] = {};
        if (!porProg[t.programa][t.plan]) porProg[t.programa][t.plan] = [];
        porProg[t.programa][t.plan].push({
          ...t,
          avanceZona: t.zonas?.[zona]?.avance ?? t.avance,
          estadoZona: t.zonas?.[zona]?.estado ?? t.estado,
          comentarioZona: t.zonas?.[zona]?.comentario ?? "",
        });
      });

      return { zona, avProm, porProg };
    });
  }, [tareas]);

  // Vista: grilla de zonas
  if (!zonaActiva) return (
    <div>
      <LeyendaSemaforo/>
      <div style={{ fontSize:11, color:"#64748B", fontWeight:700, textTransform:"uppercase", letterSpacing:".07em", marginBottom:12 }}>
        Desempeño por zona RZN
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))", gap:10, marginBottom:20 }}>
        {dataZonas.map(({ zona, avProm }) => {
          const { bar, bg, text, label } = colorAvance(avProm);
          return (
            <div key={zona} onClick={() => { setZonaActiva(zona); setProgActivo(null); setPlanActivo(null); }}
              style={{ background:"#fff", border:`1px solid #E2E8F0`, borderTop:`4px solid ${bar}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", transition:"box-shadow .15s" }}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.08)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
              <div style={{ fontSize:11, color:"#94A3B8", fontWeight:600, textTransform:"uppercase", letterSpacing:".06em", marginBottom:6 }}>{zona}</div>
              <div style={{ fontSize:26, fontWeight:800, color:bar, lineHeight:1 }}>{pct(avProm)}%</div>
              <span style={{ fontSize:10, background:bg, color:text, borderRadius:99, padding:"1px 8px", fontWeight:700, marginTop:6, display:"inline-block" }}>{label}</span>
            </div>
          );
        })}
      </div>

      {/* Tabla comparativa rápida */}
      <div style={{ background:"#fff", border:"1px solid #E2E8F0", borderRadius:12, overflow:"hidden" }}>
        <div style={{ padding:"14px 18px", borderBottom:"1px solid #E2E8F0", fontWeight:700, color:"#0F172A", fontSize:14 }}>
          Comparativo de zonas
        </div>
        <div style={{ padding:"12px 18px", display:"flex", flexDirection:"column", gap:8 }}>
          {[...dataZonas].sort((a,b)=>b.avProm-a.avProm).map(({ zona, avProm }) => {
            const { bar } = colorAvance(avProm);
            return (
              <div key={zona} style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}
                onClick={() => { setZonaActiva(zona); setProgActivo(null); setPlanActivo(null); }}>
                <span style={{ fontSize:12, fontWeight:700, color:"#475569", minWidth:60 }}>{zona}</span>
                <div style={{ flex:1 }}><BarraAvance valor={avProm} height={8}/></div>
                <span style={{ fontSize:13, fontWeight:800, color:bar, minWidth:38, textAlign:"right" }}>{pct(avProm)}%</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

  const zdData = dataZonas.find(z => z.zona === zonaActiva);
  const progNames = Object.keys(zdData.porProg);
  const { bar: zBar } = colorAvance(zdData.avProm);

  // Vista: programas de una zona
  if (!progActivo) return (
    <div>
      <button onClick={() => setZonaActiva(null)}
        style={{ background:"none", border:"none", color:CLIENTE.colorA, cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:18, padding:0 }}>
        ← Todas las zonas
      </button>
      <div style={{ borderLeft:`4px solid ${zBar}`, paddingLeft:14, marginBottom:18 }}>
        <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>ZONA</div>
        <h2 style={{ margin:0, fontSize:20, fontWeight:800, color:"#0F172A" }}>{zonaActiva}</h2>
        <div style={{ fontSize:13, color:"#64748B", marginTop:4 }}>Avance promedio: <strong style={{ color:zBar }}>{pct(zdData.avProm)}%</strong></div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {progNames.map((prog, i) => {
          const planes = zdData.porProg[prog];
          const allTs = Object.values(planes).flat();
          const av = avg(allTs.map(t => t.avanceZona));
          const { bar: b } = colorAvance(av);
          const col = PROG_COLORS[i % PROG_COLORS.length];
          return (
            <Card key={prog} onClick={() => setProgActivo(prog)} accent={b}>
              <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:3 }}>PROGRAMA</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, gap:10 }}>
                <span style={{ fontWeight:700, color:"#0F172A", fontSize:14 }}>{prog}</span>
                <span style={{ fontWeight:800, color:b, fontSize:18 }}>{pct(av)}%</span>
              </div>
              <BarraAvance valor={av} height={6}/>
              <div style={{ fontSize:11, color:"#94A3B8", marginTop:6 }}>{Object.keys(planes).length} planes · {allTs.length} tareas</div>
            </Card>
          );
        })}
      </div>
    </div>
  );

  const planesDelProg = zdData.porProg[progActivo];
  const planNames = Object.keys(planesDelProg);
  const avProg = avg(Object.values(planesDelProg).flat().map(t => t.avanceZona));
  const { bar: pBar } = colorAvance(avProg);

  // Vista: planes de un programa en una zona
  if (!planActivo) return (
    <div>
      <button onClick={() => setProgActivo(null)}
        style={{ background:"none", border:"none", color:CLIENTE.colorA, cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:18, padding:0 }}>
        ← {zonaActiva}
      </button>
      <div style={{ borderLeft:`4px solid ${pBar}`, paddingLeft:14, marginBottom:18 }}>
        <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>PROGRAMA · {zonaActiva}</div>
        <h2 style={{ margin:0, fontSize:18, fontWeight:800, color:"#0F172A" }}>{progActivo}</h2>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {planNames.map(plan => {
          const ts = planesDelProg[plan];
          const av = avg(ts.map(t => t.avanceZona));
          const { bar: b } = colorAvance(av);
          return (
            <Card key={plan} onClick={() => setPlanActivo(plan)} accent={b}>
              <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:3 }}>PLAN</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <span style={{ fontWeight:700, color:"#0F172A", fontSize:14 }}>{plan}</span>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:11, color:"#94A3B8" }}>{ts.length} tareas</span>
                  <span style={{ fontWeight:800, color:b, fontSize:16 }}>{pct(av)}%</span>
                  <span style={{ color:"#CBD5E1", fontSize:18 }}>›</span>
                </div>
              </div>
              <BarraAvance valor={av} height={6}/>
            </Card>
          );
        })}
      </div>
    </div>
  );

  // Vista: tareas de un plan en una zona
  const tareasDelPlan = planesDelProg[planActivo];
  return (
    <div>
      <button onClick={() => setPlanActivo(null)}
        style={{ background:"none", border:"none", color:CLIENTE.colorA, cursor:"pointer", fontSize:13, fontWeight:700, marginBottom:18, padding:0 }}>
        ← {progActivo}
      </button>
      <div style={{ borderLeft:`4px solid ${colorAvance(avg(tareasDelPlan.map(t=>t.avanceZona))).bar}`, paddingLeft:14, marginBottom:18 }}>
        <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:2 }}>PLAN · {zonaActiva}</div>
        <h2 style={{ margin:0, fontSize:18, fontWeight:800, color:"#0F172A" }}>{planActivo}</h2>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
        {tareasDelPlan.map(t => {
          const { bar: b } = colorAvance(t.avanceZona);
          const eCfg = ESTADO_CFG[t.estadoZona];
          return (
            <Card key={t.id} onClick={() => onEditar(t)} accent={b}>
              <div style={{ fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".08em", color:"#94A3B8", marginBottom:3 }}>TAREA</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, marginBottom:8, flexWrap:"wrap" }}>
                <span style={{ fontWeight:700, color:"#0F172A", fontSize:13, flex:1, lineHeight:1.35 }}>{t.tarea||"(Sin nombre)"}</span>
                <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                  <span style={{ fontSize:11, background:eCfg?.bg, color:eCfg?.text, borderRadius:99, padding:"2px 9px", fontWeight:700, display:"flex", alignItems:"center", gap:4 }}>
                    <span style={{ width:6, height:6, borderRadius:"50%", background:eCfg?.dot }}/>
                    {t.estadoZona}
                  </span>
                  <span style={{ fontWeight:800, color:b, fontSize:15 }}>{pct(t.avanceZona)}%</span>
                </div>
              </div>
              <BarraAvance valor={t.avanceZona} height={6}/>
              {t.comentarioZona && (
                <div style={{ fontSize:11, color:"#94A3B8", marginTop:7, fontStyle:"italic" }}>
                   {t.comentarioZona}
                </div>
              )}
              <div style={{ display:"flex", gap:10, marginTop:6, flexWrap:"wrap" }}>
                {t.responsable&&<span style={{ fontSize:11, color:"#64748B" }}> {t.responsable}</span>}
                {t.fechaVencimiento&&<span style={{ fontSize:11, color:"#94A3B8" }}> {fmtD(t.fechaVencimiento)}</span>}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [usuario, setUsuario]     = useState(undefined);
  const [usuarios, setUsuarios]   = useState(USUARIOS_DEMO);
  const [tareas,setTareas]        = useState(DEMO);
  const [vista,setVista]          = useState("ejecutivo");
  const [navPlanes, setNavPlanes] = useState({});   // {prog, pl} para navegación directa
  const [modal,setModal]          = useState(null);
  const [saving,setSaving]        = useState(false);
  const [toast,setToast]          = useState(null);
  const [showAyuda, setShowAyuda]         = useState(false);
  const [showAyuda, setShowAyuda]         = useState(false);
  const [showCambioPin, setShowCambioPin] = useState(false);
  const [showAdmin, setShowAdmin]         = useState(false);
  const [resetTarget, setResetTarget]     = useState(null);
  const [showUserMenu, setShowUserMenu]   = useState(false);

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};
  const handleLogin  = (u) => setUsuario(u);
  const handleLogout = () => { setUsuario(undefined); setModal(null); setShowUserMenu(false); };

  // Navegación desde Resumen → Programas o Planes
  const handleNavegar = (destVista, params={}) => {
    if (destVista === "programas") {
      setVista("programas");
    } else if (destVista === "planes") {
      setNavPlanes({ prog: params.prog, pl: params.pl });
      setVista("planes");
    }
  };

  const handleEditar = (tarea) => {
    if (puedeEditar(usuario, tarea)) setModal(tarea);
    else showToast("Solo lectura — no tenés permisos para editar esta tarea.", false);
  };

  const guardar = useCallback(async(form) => {
    setSaving(true);
    try { setTareas(prev=>prev.map(t=>t.id===form.id?form:t)); setModal(null); showToast("Cambio guardado ✓"); }
    finally { setSaving(false); }
  },[]);

  const handleCambiarPin     = (pin)   => { setUsuarios(prev=>prev.map(u=>u.id===usuario.id?{...u,pin}:u)); setUsuario(prev=>({...prev,pin})); };
  const handleAgregarUsuario = (nuevo) => { setUsuarios(prev=>[...prev,nuevo]); showToast(`Usuario ${nuevo.nombre} creado`); };
  const handleEliminarUsuario= (id)    => { setUsuarios(prev=>prev.filter(u=>u.id!==id)); showToast("Usuario eliminado"); };
  const handleResetPin       = (uid,pin)=>{ setUsuarios(prev=>prev.map(u=>u.id===uid?{...u,pin}:u)); setResetTarget(null); };

  if (usuario === undefined) return <PantallaLogin onLogin={handleLogin} usuarios={usuarios}/>;

  const TABS=[
    {id:"ejecutivo",icon:"",label:"Resumen"},
    {id:"programas",icon:"",label:"Programas"},
    {id:"planes",   icon:"",label:"Planes"},
    {id:"equipos",  icon:"",label:"Equipos"},
    {id:"tareas",   icon:"✅",label:"Tareas"},
  ];
  const totalAv=avg(tareas.map(t=>t.avance));
  const {bar}=colorAvance(totalAv);
  const rolColor=!usuario?"#64748B":usuario.rol==="sr"?CLIENTE.colorB:CLIENTE.colorA;

  return (
    <div style={{minHeight:"100vh",background:"#F1F5F9",fontFamily:"'Segoe UI', system-ui, sans-serif"}}>
      <style>{`* { box-sizing:border-box; } select,input,textarea,button { font-family:inherit; }`}</style>

      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      {modal&&<Modal tarea={modal} onSave={guardar} onClose={()=>setModal(null)} saving={saving} usuario={usuario}/>}
      {showAyuda&&<ModalAyuda onClose={()=>setShowAyuda(false)}/>}
      {showAyuda&&<ModalAyuda onClose={()=>setShowAyuda(false)}/>}
      {showCambioPin&&usuario&&<ModalCambioPin usuario={usuario} onCambiar={handleCambiarPin} onClose={()=>setShowCambioPin(false)}/>}
      {showAdmin&&usuario?.rol==="sr"&&<PanelAdmin usuarios={usuarios} onAgregar={handleAgregarUsuario} onEliminar={handleEliminarUsuario} onResetPin={(u)=>setResetTarget(u)} onClose={()=>setShowAdmin(false)}/>}
      {resetTarget&&<ModalResetPin usuario={resetTarget} onConfirmar={handleResetPin} onClose={()=>setResetTarget(null)}/>}

      {/* ── HEADER ── */}
      <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <div style={{maxWidth:980,margin:"0 auto",padding:"0 16px"}}>
          <div style={{height:4,background:`linear-gradient(90deg, ${CLIENTE.colorB}, ${CLIENTE.colorA}, ${CLIENTE.colorC})`,margin:"0 -16px",marginBottom:0}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <LogoDonMario height={40}/>
              <div style={{borderLeft:"1px solid #E2E8F0",paddingLeft:14}}>
                <div style={{fontSize:11,color:"#64748B",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase"}}>{CLIENTE.subtitulo}</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:10,padding:"7px 14px"}}>
                <span style={{fontSize:12,color:"#64748B",fontWeight:600}}>Avance PAC</span>
                <span style={{fontSize:20,fontWeight:800,color:bar}}>{pct(totalAv)}%</span>
                <div style={{width:60}}><BarraAvance valor={totalAv} height={6}/></div>
              </div>
              {/* Botón Ayuda */}
              <button onClick={()=>setShowAyuda(true)}
                style={{display:"flex",alignItems:"center",gap:5,background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:99,padding:"6px 13px",cursor:"pointer",fontSize:12,fontWeight:700,color:"#475569",transition:"border-color .15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#CBD5E1"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#E2E8F0"}>
                ❓ Ayuda
              </button>
              {/* Chip usuario con menú */}
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowUserMenu(v=>!v)}
                  style={{display:"flex",alignItems:"center",gap:6,background:"#F8FAFC",border:`1.5px solid ${rolColor}`,borderRadius:99,padding:"6px 12px",cursor:"pointer"}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:rolColor}}/>
                  <span style={{fontSize:12,fontWeight:700,color:rolColor}}>{usuario?.nombre||"Solo lectura"}</span>
                  {usuario&&<span style={{fontSize:10,background:rolColor,color:"#fff",borderRadius:99,padding:"1px 6px",fontWeight:700}}>{usuario.rol==="sr"?"SR":usuario.zona}</span>}
                  <span style={{fontSize:10,color:"#94A3B8"}}>▾</span>
                </button>
                {showUserMenu&&(
                  <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.12)",minWidth:190,zIndex:200,overflow:"hidden"}}>
                    {usuario&&(
                      <button onClick={()=>{setShowCambioPin(true);setShowUserMenu(false);}}
                        style={{width:"100%",padding:"11px 16px",border:"none",background:"none",textAlign:"left",fontSize:13,color:"#0F172A",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}>
                         Cambiar PIN
                      </button>
                    )}
                    {usuario?.rol==="sr"&&(
                      <button onClick={()=>{setShowAdmin(true);setShowUserMenu(false);}}
                        style={{width:"100%",padding:"11px 16px",border:"none",background:"none",textAlign:"left",fontSize:13,color:"#0F172A",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}>
                        ⚙ Administrar usuarios
                      </button>
                    )}
                    <div style={{height:1,background:"#F1F5F9",margin:"4px 0"}}/>
                    <button onClick={handleLogout}
                      style={{width:"100%",padding:"11px 16px",border:"none",background:"none",textAlign:"left",fontSize:13,color:"#EF4444",cursor:"pointer",fontWeight:600,display:"flex",alignItems:"center",gap:8}}
                      onMouseEnter={e=>e.currentTarget.style.background="#FEF2F2"}
                      onMouseLeave={e=>e.currentTarget.style.background="none"}>
                      → Cerrar sesión
                    </button>
                  </div>
                )}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:0,marginTop:10}}>
            {TABS.map(tab=>(
              <button key={tab.id} onClick={()=>setVista(tab.id)}
                style={{padding:"10px 18px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:700,color:vista===tab.id?CLIENTE.colorA:"#64748B",borderBottom:`3px solid ${vista===tab.id?CLIENTE.colorA:"transparent"}`,marginBottom:-1,transition:"color .15s",whiteSpace:"nowrap"}}>
                {tab.icon} {tab.label}
              </button>
            ))}
            <span style={{marginLeft:"auto",display:"flex",alignItems:"center",fontSize:11,color:"#F97316",background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:99,padding:"3px 10px",marginBottom:8,fontWeight:700,alignSelf:"center"}}>
               DEMO
            </span>
          </div>
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"22px 14px 60px"}}>
        {vista==="ejecutivo"&&<VistaEjecutiva tareas={tareas} onEditar={handleEditar} onNavegar={handleNavegar}/>}
        {vista==="programas"&&<VistaProgramas tareas={tareas} onEditar={handleEditar}/>}
        {vista==="planes"&&<VistaPlanesAll tareas={tareas} onEditar={handleEditar} initProg={navPlanes.prog} initPlan={navPlanes.pl}/>}
        {vista==="equipos"&&<VistaEquipos tareas={tareas} onEditar={handleEditar} usuarios={usuarios}/>}
        {vista==="tareas"&&<VistaTareas tareas={tareas} onEditar={handleEditar}/>}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
